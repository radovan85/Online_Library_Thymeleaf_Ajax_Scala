function redirectLogout(){
	$.ajax({  
		type: "POST",  
		url: "http://localhost:8080/loggedout", 
		beforeSend: function(xhr){  xhr.overrideMimeType( "text/plain; charset=x-user-defined" );},
		success: function(data){
			window.location.href="/";
		},
		error: function(error) {  
        	  alert("Logout error");
        	  
          }  
	});
}


function loginInterceptor(formName) {
    var $form = $("#" + formName);

    $form.on('submit', function(e) {
        e.preventDefault();
        
        $.ajax({
            url : "http://localhost:8080/login",
            type : 'post',
            data : $form.serialize(),
            success : function(response) {
            	 confirmLoginPass();
       	 	},
       	 	error: function(error) {
       		 alert("Failed");
       		  
       	 }
        });
        
    });
};


function confirmLoginPass(){
	$.ajax({
        url : "http://localhost:8080/loginPassConfirm",

   	 	},

 			$("#ajaxLoadedContent").load("/loginErrorPage");

    });
}

function executeBookForm(){

	var formData = new FormData();
	var files = $('input[type=file]');
	for (var i = 0; i < files.length; i++) {
		if (files[i].value == "" || files[i].value == null) {
			alert("Please provide image");
	    	return false;
		}
		else {
	    	formData.append(files[i].name, files[i].files[0]);
		}
	}
	var formSerializeArray = $("#bookForm").serializeArray();
	for (var i = 0; i < formSerializeArray.length; i++) {
	  	formData.append(formSerializeArray[i].name, formSerializeArray[i].value)
	}
	if(validateBook()){
		$.ajax({
	 		type: 'POST',
	 		data: formData,
	 		contentType: false,
			processData: false,
	 		cache: false,
	 		url: "http://localhost:8080/admin/createBook",
	 		success : function(response) {
	     		$("#ajaxLoadedContent").load("books/allBooks");
	 		},
	 		error: function(error) {
		  		redirectInvalidPath();
	 		}
	 	});
	};
};

function ValidatePassword() {
	var password = document.getElementById("password").value;
	var confirmpass = document.getElementById("confirmpass").value;
	if (password != confirmpass) {
		alert("Password does Not Match.");
		return false;
	}
	return true;
};


function validateNumber(e) {
    const pattern = /^\d{0,4}(\.\d{0,4})?$/g;

    return pattern.test(e.key )
};

function validateItem(){
	var quantity = $("#quantity").val();
	var quantityNum = Number(quantity);
	var returnValue = true;
	
	if(quantity === "" || quantityNum < 1 || quantityNum > 50){
		$("#quantityError").css({"visibility": "visible"});
		returnValue = false;
	}else{
		$("#quantityError").css({"visibility": "hidden"});
	}
	
	return returnValue;
}

function validateKeyword(){
	var returnValue = true;
	var keyword=$("#keyword").val();
	
	if(keyword === ""){
		$("#keywordError").css({"visibility": "visible"});
		returnValue = false;
	}else{
		$("#keywordError").css({"visibility": "hidden"});
	}
	
	return returnValue;
}

function validateBookQuantity(bookQuantity){
	var returnValue = true;
	
	if(bookQuantity > 100){
		alert("Maximum 100 books allowed for 1 shipment!\nPlease update your cart!");
		returnValue = false;
	}
	
	return returnValue;
}
