<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security5">

<th:block th:fragment="ajaxLoadedContent">

	<div class="container" style="margin-top: 125px;font-family: Rajdhani, sans-serif;">
		<div class="jumbotron" style="background-color: #09228c;color: #d9d9d9;" align="center">
			<h2 th:text="${'Order Completed'}"></h2>
		</div>
		
		<th:block th:if="${cardPoints != null}">
			<div style="margin-top: 60px;margin-bottom: 100px;">
				<h4 th:text="${'Points collected: ' + pointsCollected}"></h4>
				<h4 th:text="${'Points spent: ' + pointsSpent}"></h4>
				<h4 th:text="${'Loyalty discount: ' + discount + '%'}"></h4>
			</div>
		</th:block>
		<div align="center" style="margin-top: 40px;margin-bottom: 100px;">
			<button class="btn btn-secondary" th:onclick="redirectHome()">Home Page</button>
		</div>
	</div>

</th:block>
