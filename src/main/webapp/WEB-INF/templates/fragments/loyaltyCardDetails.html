<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security5">

<th:block th:fragment="ajaxLoadedContent">

	<div class="container" style="margin-top: 125px;font-family: Rajdhani, sans-serif;" align="center">
		<th:block th:if="${customer.loyaltyCardId == null}">
		
			<th:block th:if="${cardRequest == null}">
				<h2 th:text="${'You do not have loyalty card currently'}"></h2>
				<button class="btn btn-dark" style="margin-top: 40px;"
					th:onclick="getLoyaltyCard()">Apply For Card
				</button>
			</th:block>
		
			<th:block th:if="${cardRequest != null}">
				<h2 th:text="${'Your card request is waiting for Admin Review'}"></h2>
			</th:block>
		
		</th:block>
		
		<th:block th:if="${customer.loyaltyCardId != null}">
			<h2 th:text="${'You are part of our loyalty program'}"></h2>
				<div class="container" style="margin-top: 60px">
						<th:block th:each="tempCard : ${allCards}">
							<th:block th:if="${customer.loyaltyCardId == tempCard.loyaltyCardId}">
								<table class="table table-bordered table-success" style="width:500px;">
									<tbody class="table-success">
										<tr>
											<td th:text="${'Card Id:'}"></td>
											<td th:text="${tempCard.loyaltyCardId}"></td>
										</tr>
										
										<tr>
											<td th:text="${'Points'}"></td>
											<td th:text="${tempCard.points}"></td>
										</tr>
									</tbody>
								</table>
							</th:block>
						</th:block>
				</div>
		</th:block>
		<div align="center" style="margin-bottom: 100px;margin-top: 50px;font-family:Rajdhani, sans-serif;">
			<button class="btn btn-info" th:onclick="redirectHome()">Home Page</button>
		</div>
	</div>
	
	
</th:block>
